name: CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          version: 1.85

      - name: Run tests
        run: cargo test --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt -- --check

  build:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          version: 1.85

      - name: Build release
        run: cargo build --release

      - name: Prepare binary
        run: |
          ARCH=$(uname -m)
          if [[ "$ARCH" == "arm64" ]]; then
            mv target/release/silo silo-macos-arm64
          else
            mv target/release/silo silo-macos-x86_64
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: silo-macos-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
